<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FishMap — Shabbona Lake</title>

<!-- Leaflet v1.9.4 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
 /* ===== RESET & BASE ===== */
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --bg: #1a1a2e;
 --header: #16213e;
 --accent: #e94560;
 --text: #eeeeee;
 --text-dim: #aaaabb;
 }

 html, body {
 height: 100%;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--bg);
 color: var(--text);
 overflow: hidden;
 -webkit-tap-highlight-color: transparent;
 }

 body {
 display: flex;
 flex-direction: column;
 height: 100dvh;
 }

 /* ===== HEADER ===== */
 #header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 background: var(--header);
 padding: 10px 14px;
 flex-shrink: 0;
 z-index: 1000;
 border-bottom: 1px solid #0f3460;
 }

 #header .title {
 font-size: 18px;
 font-weight: 700;
 letter-spacing: 0.5px;
 }

 #gps-status {
 display: flex;
 align-items: center;
 gap: 6px;
 font-size: 12px;
 color: var(--text-dim);
 }

 .gps-dot {
 width: 10px;
 height: 10px;
 border-radius: 50%;
 display: inline-block;
 flex-shrink: 0;
 background: #555;
 transition: background 0.3s;
 }

 .gps-dot.searching {
 background: #ffaa00;
 animation: pulse 1s ease-in-out infinite;
 }

 .gps-dot.active {
 background: #00ff88;
 animation: none;
 }

 @keyframes pulse {
 0%, 100% { opacity: 1; transform: scale(1); }
 50% { opacity: 0.3; transform: scale(0.75); }
 }

 /* ===== MAP ===== */
 #map {
 flex: 1;
 z-index: 1;
 background: #8DB87A;
 }

 /* HOT OSM tiles with hue-rotate — warm beige land becomes green, roads stay visible */
 .leaflet-tile-pane {
 filter: hue-rotate(100deg) saturate(0.6) brightness(1.1);
 }

 /* ===== LAKE SELECTOR ===== */
 .lake-selector {
 display: flex;
 gap: 4px;
 background: rgba(22, 33, 62, 0.94);
 border-radius: 10px;
 padding: 4px;
 }

 .lake-btn {
 border: none;
 border-radius: 8px;
 padding: 6px 12px;
 font-size: 12px;
 font-weight: 600;
 cursor: pointer;
 white-space: nowrap;
 transition: background 0.2s, color 0.2s;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 }

 .lake-btn.active {
 background: #0f3460;
 color: #eeeeee;
 }

 .lake-btn.inactive {
 background: transparent;
 color: #8899aa;
 }

 .lake-btn.inactive:hover {
 background: rgba(255,255,255,0.08);
 color: #bbccdd;
 }

 /* ===== BOTTOM BAR ===== */
 #bottom-bar {
 display: flex;
 align-items: center;
 justify-content: space-between;
 background: var(--header);
 padding: 10px 12px;
 flex-shrink: 0;
 z-index: 1000;
 gap: 8px;
 border-top: 1px solid #0f3460;
 }

 #bottom-bar button {
 border: none;
 border-radius: 10px;
 padding: 10px 16px;
 font-size: 14px;
 font-weight: 600;
 cursor: pointer;
 white-space: nowrap;
 flex-shrink: 0;
 transition: background 0.2s, transform 0.1s;
 }

 #bottom-bar button:active { transform: scale(0.95); }

 #btn-me {
 background: #0f3460;
 color: var(--text);
 }

 #btn-me:active { background: #1a4a7a; }

 #coord-display {
 flex: 1;
 text-align: center;
 font-size: 12px;
 color: #7ecef4;
 font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
 overflow: hidden;
 text-overflow: ellipsis;
 white-space: nowrap;
 min-width: 0;
 line-height: 1.3;
 }

 #coord-display .sublabel {
 display: block;
 font-size: 10px;
 color: #888;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 }

 #btn-log {
 background: var(--accent);
 color: #fff;
 font-size: 15px;
 padding: 11px 20px;
 }

 #btn-log:active { background: #c73652; }

 #btn-log.logged {
 background: #2ecc71;
 }

 /* ===== OPACITY SLIDER ===== */
 #slider-container {
 position: fixed;
 bottom: 72px;
 right: 10px;
 z-index: 1000;
 background: rgba(22, 33, 62, 0.94);
 border-radius: 10px;
 padding: 10px 12px;
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 4px;
 }

 #slider-container label {
 font-size: 10px;
 color: var(--text-dim);
 letter-spacing: 0.3px;
 }

 #opacity-slider {
 width: 110px;
 accent-color: var(--accent);
 cursor: pointer;
 }

 /* ===== LEAFLET OVERRIDES ===== */
 .leaflet-control-attribution { font-size: 8px !important; }

 /* ===== GPS BLUE DOT MARKER ===== */
 .blue-dot {
 width: 16px;
 height: 16px;
 background: #007AFF;
 border: 3px solid white;
 border-radius: 50%;
 box-shadow: 0 0 8px rgba(0, 122, 255, 0.8);
 }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div id="header">
 <span class="title">🎣 FishMap</span>
 <div id="gps-status">
 <span class="gps-dot searching" id="gps-dot"></span>
 <span id="gps-label">Searching…</span>
 </div>
</div>

<!-- ===== MAP ===== -->
<div id="map"></div>

<!-- ===== OPACITY SLIDER ===== -->
<div id="slider-container">
 <label for="opacity-slider">Contour opacity</label>
 <input type="range" id="opacity-slider" min="0" max="100" value="80">
</div>

<!-- ===== BOTTOM BAR ===== -->
<div id="bottom-bar">
 <button id="btn-me">📍 Me</button>
 <div id="coord-display">—<span class="sublabel">tap map</span></div>
 <button id="btn-log">🐟 Log Catch</button>
</div>

<!-- Leaflet v1.9.4 -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Turf.js for polygon clipping -->
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
(function () {
 'use strict';

 /* ===== LAKE CONFIGURATIONS ===== */
 var LAKES = {
 shabbona: {
   name: 'Shabbona Lake',
   center: [41.745230, -88.862420],
   zoom: 14,
   contourUrl: 'data/shabbona-lake.geojson',
   boundaryUrl: 'data/shabbona-boundary.geojson',
   needsClipping: true,
   lakeFillFromContour: false
 },
 patterson: {
   name: 'Lake Patterson',
   center: [41.7520, -88.2720],
   zoom: 15,
   contourUrl: 'data/lake-patterson.geojson',
   boundaryUrl: null,
   needsClipping: false,
   lakeFillFromContour: true,    /* use outermost (0.5ft) contour as fill shape */
   lakeFillDepth: 0.5
 }
 };

 var activeLakeId = 'shabbona';
 var STORAGE_KEY = 'fishmap_catches';
 var MIN_LABEL_DISTANCE = 0.002; /* minimum 0.002 degrees (~200m) between any two labels */

 var map = L.map('map', { center: LAKES.shabbona.center, zoom: LAKES.shabbona.zoom, zoomControl: true });

 map.createPane('lakePane');
 map.getPane('lakePane').style.zIndex = 300;
 map.createPane('contourPane');
 map.getPane('contourPane').style.zIndex = 400;
 var depthLabelPane = map.createPane('labelPane');
 map.getPane('labelPane').style.zIndex = 500;

 /* HOT OSM tiles — warm beige land is hue-rotated green via CSS filter.
    #map background #8DB87A provides green fallback while tiles load. */
 L.tileLayer(
 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
 { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors | Tiles: HOT' }
 ).addTo(map);

 /* ===== LAKE SELECTOR CONTROL ===== */
 var LakeSelectorControl = L.Control.extend({
 options: { position: 'topleft' },
 onAdd: function () {
   var container = L.DomUtil.create('div', 'lake-selector');
   L.DomEvent.disableClickPropagation(container);
   L.DomEvent.disableScrollPropagation(container);

   var btnShabbona = L.DomUtil.create('button', 'lake-btn active', container);
   btnShabbona.textContent = 'Shabbona Lake';
   btnShabbona.setAttribute('data-lake', 'shabbona');

   var btnPatterson = L.DomUtil.create('button', 'lake-btn inactive', container);
   btnPatterson.textContent = 'Lake Patterson';
   btnPatterson.setAttribute('data-lake', 'patterson');

   container.addEventListener('click', function (e) {
     var btn = e.target.closest('.lake-btn');
     if (!btn) return;
     var lakeId = btn.getAttribute('data-lake');
     if (lakeId === activeLakeId) return;
     /* Update button states */
     container.querySelectorAll('.lake-btn').forEach(function (b) {
       b.className = 'lake-btn ' + (b.getAttribute('data-lake') === lakeId ? 'active' : 'inactive');
     });
     switchLake(lakeId);
   });

   return container;
 }
 });
 new LakeSelectorControl().addTo(map);

 /* ===== CONTOUR & LAKE STATE ===== */
 /* ===== DEPTH COLOR SCALE ===== */
 /* Blue gradient: shallow = light blue, deep = dark navy */
 var DEPTH_COLORS = {
   0.5:  '#d4ecf7',
   1:    '#c6e4f4',
   2:    '#b8dff0',
   3:    '#a5d5ec',
   4:    '#92cbea',
   5:    '#7fc0e5',
   6:    '#6bb5e0',
   7:    '#58a8d8',
   8:    '#489cd4',
   9.5:  '#3b8cc9',
   10:   '#2e7fbf',
   10.5: '#2872b2',
   11:   '#2368aa',
   11.5: '#1e64a4',
   12:   '#1a5a9a',
   12.5: '#175290',
   13:   '#154d88',
   13.5: '#134a85',
   14:   '#10407a',
   14.5: '#0d3970',
   15:   '#0b3468',
   15.5: '#0a3260'
 };
 var DEPTH_VALUES = [0.5, 1, 2, 3, 4, 5, 6, 7, 8, 9.5, 10, 10.5, 11, 11.5, 12, 12.5, 13, 13.5, 14, 14.5, 15, 15.5];

 function getDepthColor(depth) {
   if (DEPTH_COLORS[depth]) return DEPTH_COLORS[depth];
   /* Interpolate for unexpected depths */
   for (var i = 0; i < DEPTH_VALUES.length - 1; i++) {
     if (depth >= DEPTH_VALUES[i] && depth <= DEPTH_VALUES[i + 1]) {
       return DEPTH_COLORS[DEPTH_VALUES[i]];
     }
   }
   return '#6bb5e0';
 }

 /* Zoom-dependent contour style with depth-based coloring.
    zoom < 13  → lighter appearance
    zoom >= 13 → full detail */
 function getContourStyle(feature) {
   var zoom = map.getZoom();
   var depth = feature && feature.properties ? feature.properties.depth : 0;
   var fillColor = getDepthColor(depth);
   if (zoom < 13) {
     return { color: '#3a5a7a', weight: 1, opacity: 0.3, fillColor: fillColor, fillOpacity: 0.7 };
   } else {
     return { color: '#3a5a7a', weight: 1.2, opacity: 0.8, fillColor: fillColor, fillOpacity: 0.85 };
   }
 }

 var geoJsonLayer = null;
 var lakeFillLayer = null;
 var lakeTurfPolygon = null;

 /* ===== SWITCH LAKE ===== */
 function switchLake(lakeId) {
 activeLakeId = lakeId;
 var lake = LAKES[lakeId];

 /* Update page title */
 document.title = 'FishMap \u2014 ' + lake.name;

 /* Clear existing layers */
 clearLabels();
 if (geoJsonLayer) { map.removeLayer(geoJsonLayer); geoJsonLayer = null; }
 if (lakeFillLayer) { map.removeLayer(lakeFillLayer); lakeFillLayer = null; }
 lakeTurfPolygon = null;
 allContourFeatures = [];
 contourFeatures = [];

 /* Center map */
 map.setView(lake.center, lake.zoom);

 /* Load boundary (if exists) then contours */
 if (lake.boundaryUrl) {
   fetch(lake.boundaryUrl)
     .then(function(res) { return res.json(); })
     .then(function(geojson) {
       var feature = geojson.features[0];
       if (!feature) { loadContours(); return; }
       var latlngs = feature.geometry.coordinates[0].map(function(c) { return [c[1], c[0]]; });
       lakeFillLayer = L.polygon(latlngs, { color: 'none', fillColor: '#7FB5D5', fillOpacity: 1.0, interactive: false, pane: 'lakePane' }).addTo(map);
       lakeTurfPolygon = turf.polygon([feature.geometry.coordinates[0]]);
       loadContours();
     })
     .catch(function() { loadContours(); });
 } else {
   loadContours();
 }
 }

 /* Clip ALL contour features to lake boundary.
    - Polygon/MultiPolygon: use turf.intersect to clip filled areas to lake boundary.
    - LineString: use turf.lineSplit + midpoint-in-polygon to trim lines at boundary.
    This guarantees zero spill for BOTH fill areas and line strokes. */
 function clipFeatureToLake(feature) {
 if (!lakeTurfPolygon) return [feature];
 var geomType = feature.geometry.type;

 /* ---- Polygon / MultiPolygon clipping ---- */
 if (geomType === 'Polygon' || geomType === 'MultiPolygon') {
   try {
     var clipped = turf.intersect(feature, lakeTurfPolygon);
     if (!clipped) return []; /* no overlap with lake — skip entirely */
     clipped.properties = JSON.parse(JSON.stringify(feature.properties));
     return [clipped];
   } catch(e) {
     /* Fallback: check centroid — if inside lake, keep as-is */
     try {
       var centroid = turf.centroid(feature);
       if (turf.booleanPointInPolygon(centroid, lakeTurfPolygon)) return [feature];
       return [];
     } catch(e2) { return [feature]; }
   }
 }

 /* ---- LineString clipping ---- */
 try {
   var coords = feature.geometry.coordinates;
   if (!coords || coords.length < 2) return [];
   var line = turf.lineString(coords);
   var lakeBoundary = turf.polygonToLine(lakeTurfPolygon);
   var split = turf.lineSplit(line, lakeBoundary);
   if (!split || !split.features || split.features.length === 0) {
     /* lineSplit returned nothing — check if the whole line midpoint is inside */
     var midIdx = Math.floor(coords.length / 2);
     var midPt = turf.point(coords[midIdx]);
     if (turf.booleanPointInPolygon(midPt, lakeTurfPolygon)) return [feature];
     return [];
   }
   var kept = [];
   for (var i = 0; i < split.features.length; i++) {
     var seg = split.features[i];
     var segCoords = seg.geometry.coordinates;
     if (segCoords.length < 2) continue;
     var segMidIdx = Math.floor(segCoords.length / 2);
     var segMidPt = turf.point(segCoords[segMidIdx]);
     if (turf.booleanPointInPolygon(segMidPt, lakeTurfPolygon)) {
       kept.push({
         type: 'Feature',
         properties: JSON.parse(JSON.stringify(feature.properties)),
         geometry: seg.geometry
       });
     }
   }
   return kept;
 } catch(e) {
   /* Fallback: sample points, keep only if all are inside */
   try {
     var fc = feature.geometry.coordinates;
     var step = Math.max(1, Math.floor(fc.length / 10));
     for (var j = 0; j < fc.length; j += step) {
       if (!turf.booleanPointInPolygon(turf.point(fc[j]), lakeTurfPolygon)) return [];
     }
     if (!turf.booleanPointInPolygon(turf.point(fc[fc.length - 1]), lakeTurfPolygon)) return [];
     return [feature];
   } catch(e2) { return [feature]; }
 }
 }

 function loadContours() {
 var lake = LAKES[activeLakeId];
 fetch(lake.contourUrl)
 .then(function(res) { return res.json(); })
 .then(function(data) {
   data.features = data.features.filter(function(f) { return f.properties.depth > 0; });

   /* For lakes that derive their fill from the outermost contour (e.g. Patterson) */
   if (lake.lakeFillFromContour && !lakeFillLayer) {
     var fillDepth = lake.lakeFillDepth || 2;
     var fillFeature = null;
     for (var i = 0; i < data.features.length; i++) {
       var f = data.features[i];
       if (f.properties.depth === fillDepth && (f.geometry.type === 'Polygon' || f.geometry.type === 'MultiPolygon')) {
         fillFeature = f;
         break;
       }
     }
     if (fillFeature) {
       lakeFillLayer = L.geoJSON(fillFeature, {
         pane: 'lakePane',
         style: { color: 'none', fillColor: '#7FB5D5', fillOpacity: 1.0 },
         interactive: false
       }).addTo(map);
     }
   }

   /* Clip contours to boundary if needed (Shabbona) */
   if (lake.needsClipping && lakeTurfPolygon) {
     var clippedFeatures = [];
     data.features.forEach(function(f) {
       var segments = clipFeatureToLake(f);
       for (var k = 0; k < segments.length; k++) {
         clippedFeatures.push(segments[k]);
       }
     });
     data.features = clippedFeatures;
   }
   renderContours(data);
 })
 .catch(function(err) { console.error('Failed to load GeoJSON:', err); });
 }

 var allContourFeatures = [];
 var contourFeatures = [];

 function renderContours(data) {
 /* Sort so shallow contours render first (bottom), deeper on top */
 data.features.sort(function(a, b) { return a.properties.depth - b.properties.depth; });
 allContourFeatures = data.features;
 contourFeatures = data.features;
 updateContoursForZoom();
 }

 /* Opacity slider scales the zoom-appropriate base opacity */
 function updateContoursForZoom() {
 var zoom = map.getZoom();
 contourFeatures = zoom < 13 ? allContourFeatures.filter(function(f) { return f.properties.depth % 5 === 0; }) : allContourFeatures;
 if (geoJsonLayer) map.removeLayer(geoJsonLayer);

 /* Sort features so shallow (low depth) renders first (bottom), deep renders last (top) */
 var sorted = contourFeatures.slice().sort(function(a, b) { return a.properties.depth - b.properties.depth; });

 geoJsonLayer = L.geoJSON({ type: 'FeatureCollection', features: sorted }, { pane: 'contourPane', style: getContourStyle, onEachFeature: function(feature, layer) { layer.bindPopup('Depth: ' + feature.properties.depth + ' ft'); } }).addTo(map);
 applySliderOpacity();
 addLabels(contourFeatures);
 }

 function applySliderOpacity() {
 if (!geoJsonLayer) return;
 var sliderVal = document.getElementById('opacity-slider').value / 100;
 var zoom = map.getZoom();
 geoJsonLayer.eachLayer(function(layer) {
   var feature = layer.feature;
   if (!feature) return;
   var base = getContourStyle(feature);
   layer.setStyle({ opacity: base.opacity * sliderVal, fillOpacity: base.fillOpacity * sliderVal });
 });
 }

 var activeLabelMarkers = [];
 function clearLabels() { activeLabelMarkers.forEach(function(m) { map.removeLayer(m); }); activeLabelMarkers = []; }

 /* Label style — 11px, weight 700, white text with dark shadow for legibility on blue fills */
 function placeLabel(latlng, depth) {
 var marker = L.marker(latlng, { icon: L.divIcon({ className: '', html: '<div style="color:#ffffff;font-size:11px;font-weight:700;font-family:sans-serif;white-space:nowrap;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.7), 0 0 6px rgba(0,0,0,0.4);">' + depth + '</div>', iconSize: [20, 14], iconAnchor: [10, 7] }), pane: 'labelPane', interactive: false });
 marker.addTo(map);
 activeLabelMarkers.push(marker);
 }

 /* Helper: extract a flat coordinate array from any geometry type for label sampling */
 function getFeatureCoords(feature) {
 var geom = feature.geometry;
 if (geom.type === 'LineString') return geom.coordinates;
 if (geom.type === 'Polygon') return geom.coordinates[0]; /* outer ring */
 if (geom.type === 'MultiPolygon') return geom.coordinates[0][0]; /* first ring of first poly */
 if (geom.type === 'MultiLineString') return geom.coordinates[0]; /* first line */
 return geom.coordinates || [];
 }

 /* Label placement with global distance enforcement.
    MIN_LABEL_DISTANCE = 0.006 degrees (~600m) between any two labels.
    1. Group all candidate coords by depth (11 samples per feature).
    2. For each depth, place the first valid in-bounds candidate
       that is at least MIN_LABEL_DISTANCE away from ALL previously placed labels.
    3. At zoom < 13: only label depths that are multiples of 10 (10, 20, 30ft).
       At zoom >= 13: label all depths.
    4. Guarantees at most one label per depth with no crowding. */
 function addLabels(features) {
 clearLabels();
 var bounds = map.getBounds();
 var zoom = map.getZoom();
 var labelInterval = (zoom < 13) ? 10 : 1;

 /* Build candidate points grouped by depth */
 var depthGroups = {};
 for (var fi = 0; fi < features.length; fi++) {
   var feature = features[fi];
   var d = feature.properties.depth;
   if (d <= 0) continue;
   if (labelInterval > 1 && d % labelInterval !== 0) continue;
   if (!depthGroups[d]) depthGroups[d] = [];
   var coords = getFeatureCoords(feature);
   if (!coords || coords.length < 2) continue;
   /* Sample 11 points: 0%, 10%, 20%, …, 100% */
   for (var p = 0; p <= 10; p++) {
     var idx = Math.min(Math.floor(p * (coords.length - 1) / 10), coords.length - 1);
     depthGroups[d].push(coords[idx]);
   }
 }

 /* Global placed-positions array for minimum-distance enforcement across ALL depths */
 var placedPositions = []; /* array of [lng, lat] */

 function isTooClose(pt) {
   for (var i = 0; i < placedPositions.length; i++) {
     var dx = pt[0] - placedPositions[i][0];
     var dy = pt[1] - placedPositions[i][1];
     if (Math.sqrt(dx * dx + dy * dy) < MIN_LABEL_DISTANCE) return true;
   }
   return false;
 }

 /* For each depth, place exactly ONE label at the first valid candidate
    that respects the minimum distance from ALL other placed labels */
 var placedDepths = {};
 var depthKeys = Object.keys(depthGroups);
 for (var di = 0; di < depthKeys.length; di++) {
   var depth = depthKeys[di];
   if (placedDepths[depth]) continue;
   var candidates = depthGroups[depth];
   for (var ci = 0; ci < candidates.length; ci++) {
     var pt = candidates[ci];
     var latlng = L.latLng(pt[1], pt[0]);
     if (!bounds.contains(latlng)) continue;
     /* Only check in-lake for lakes that have a boundary polygon (Shabbona) */
     if (lakeTurfPolygon && !turf.booleanPointInPolygon(turf.point(pt), lakeTurfPolygon)) continue;
     /* Reject candidate if too close to ANY previously placed label */
     if (isTooClose(pt)) continue;
     placeLabel(latlng, depth);
     placedDepths[depth] = true;
     placedPositions.push([pt[0], pt[1]]);
     break; /* STOP — one label per depth, period */
   }
 }
 }

 map.on('zoomend', function() { if (allContourFeatures.length) updateContoursForZoom(); });
 map.on('moveend', function() { if (contourFeatures.length) addLabels(contourFeatures); });
 /* Slider scales the zoom-appropriate base opacity */
 document.getElementById('opacity-slider').addEventListener('input', function () {
   applySliderOpacity();
 });

 /* ===== GPS BLUE DOT ===== */
 var blueDotIcon = L.divIcon({ className: '', html: '<div class="blue-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] });
 var userMarker = null, accuracyCircle = null, userLatLng = null;
 var gpsDotEl = document.getElementById('gps-dot');
 var gpsLabel = document.getElementById('gps-label');

 function onGPSUpdate(pos) {
 var lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
 userLatLng = L.latLng(lat, lng);
 gpsDotEl.className = 'gps-dot active';
 gpsLabel.textContent = 'GPS \u00b1' + Math.round(acc) + 'm';
 if (userMarker) { userMarker.setLatLng(userLatLng); } else { userMarker = L.marker(userLatLng, { icon: blueDotIcon, zIndexOffset: 1000 }).addTo(map); }
 if (accuracyCircle) { accuracyCircle.setLatLng(userLatLng); accuracyCircle.setRadius(acc); } else { accuracyCircle = L.circle(userLatLng, { radius: acc, color: '#007AFF', fillColor: '#007AFF', fillOpacity: 0.1, weight: 1, opacity: 0.3 }).addTo(map); }
 }
 function onGPSError() { gpsDotEl.className = 'gps-dot'; gpsLabel.textContent = 'GPS unavailable'; }
 if ('geolocation' in navigator) { navigator.geolocation.watchPosition(onGPSUpdate, onGPSError, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }); } else { gpsLabel.textContent = 'No GPS'; }

 document.getElementById('btn-me').addEventListener('click', function () { if (userLatLng) map.setView(userLatLng, Math.max(map.getZoom(), LAKES[activeLakeId].zoom)); });
 var coordDisplay = document.getElementById('coord-display');
 map.on('click', function (e) { coordDisplay.innerHTML = e.latlng.lat.toFixed(6) + ', ' + e.latlng.lng.toFixed(6) + '<span class="sublabel">tap location</span>'; });

 /* ===== CATCH LOGGING ===== */
 function loadCatches() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
 function saveCatches(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
 function addCatchMarker(entry) {
 var ts = new Date(entry.timestamp);
 var timeStr = ts.toLocaleDateString() + ' ' + ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
 L.marker([entry.lat, entry.lng], { icon: L.divIcon({ className: '', html: '<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.7))">🐟</div>', iconSize: [24,24], iconAnchor: [12,12] }) })
 .bindPopup('<div style="font-size:13px;line-height:1.5;color:#222"><b>🐟 ' + timeStr + '</b><br>' + entry.lat.toFixed(6) + ', ' + entry.lng.toFixed(6) + '</div>').addTo(map);
 }

 var catches = loadCatches();
 catches.forEach(addCatchMarker);
 var btnLog = document.getElementById('btn-log');
 btnLog.addEventListener('click', function () {
 if (!userLatLng) { alert('Waiting for GPS fix'); return; }
 var entry = { lat: userLatLng.lat, lng: userLatLng.lng, timestamp: Date.now() };
 catches.push(entry); saveCatches(catches); addCatchMarker(entry);
 btnLog.textContent = '✅ Logged!'; btnLog.classList.add('logged');
 setTimeout(function () { btnLog.textContent = '🐟 Log Catch'; btnLog.classList.remove('logged'); }, 1500);
 });

 /* ===== INITIAL LOAD — Shabbona ===== */
 switchLake('shabbona');

})();
</script>
