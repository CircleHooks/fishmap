<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FishMap — Shabbona Lake</title>

<!-- Leaflet v1.9.4 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
 /* ===== RESET & BASE ===== */
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --bg: #1a1a2e;
 --header: #16213e;
 --accent: #e94560;
 --text: #eeeeee;
 --text-dim: #aaaabb;
 }

 html, body {
 height: 100%;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--bg);
 color: var(--text);
 overflow: hidden;
 -webkit-tap-highlight-color: transparent;
 }

 body {
 display: flex;
 flex-direction: column;
 height: 100dvh;
 }

 /* ===== HEADER ===== */
 #header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 background: var(--header);
 padding: 10px 14px;
 flex-shrink: 0;
 z-index: 1000;
 border-bottom: 1px solid #0f3460;
 }

 #header .title {
 font-size: 18px;
 font-weight: 700;
 letter-spacing: 0.5px;
 }

 #gps-status {
 display: flex;
 align-items: center;
 gap: 6px;
 font-size: 12px;
 color: var(--text-dim);
 }

 .gps-dot {
 width: 10px;
 height: 10px;
 border-radius: 50%;
 display: inline-block;
 flex-shrink: 0;
 background: #555;
 transition: background 0.3s;
 }

 .gps-dot.searching {
 background: #ffaa00;
 animation: pulse 1s ease-in-out infinite;
 }

 .gps-dot.active {
 background: #00ff88;
 animation: none;
 }

 @keyframes pulse {
 0%, 100% { opacity: 1; transform: scale(1); }
 50% { opacity: 0.3; transform: scale(0.75); }
 }

 /* ===== MAP ===== */
 #map {
 flex: 1;
 z-index: 1;
 background: #8DB87A;
 }

 /* Fix 1: HOT OSM tiles with hue-rotate — warm beige land becomes green, roads stay visible */
 .leaflet-tile-pane {
 filter: hue-rotate(100deg) saturate(0.6) brightness(1.1);
 }

 /* ===== BOTTOM BAR ===== */
 #bottom-bar {
 display: flex;
 align-items: center;
 justify-content: space-between;
 background: var(--header);
 padding: 10px 12px;
 flex-shrink: 0;
 z-index: 1000;
 gap: 8px;
 border-top: 1px solid #0f3460;
 }

 #bottom-bar button {
 border: none;
 border-radius: 10px;
 padding: 10px 16px;
 font-size: 14px;
 font-weight: 600;
 cursor: pointer;
 white-space: nowrap;
 flex-shrink: 0;
 transition: background 0.2s, transform 0.1s;
 }

 #bottom-bar button:active { transform: scale(0.95); }

 #btn-me {
 background: #0f3460;
 color: var(--text);
 }

 #btn-me:active { background: #1a4a7a; }

 #coord-display {
 flex: 1;
 text-align: center;
 font-size: 12px;
 color: #7ecef4;
 font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
 overflow: hidden;
 text-overflow: ellipsis;
 white-space: nowrap;
 min-width: 0;
 line-height: 1.3;
 }

 #coord-display .sublabel {
 display: block;
 font-size: 10px;
 color: #888;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 }

 #btn-log {
 background: var(--accent);
 color: #fff;
 font-size: 15px;
 padding: 11px 20px;
 }

 #btn-log:active { background: #c73652; }

 #btn-log.logged {
 background: #2ecc71;
 }

 /* ===== OPACITY SLIDER ===== */
 #slider-container {
 position: fixed;
 bottom: 72px;
 right: 10px;
 z-index: 1000;
 background: rgba(22, 33, 62, 0.94);
 border-radius: 10px;
 padding: 10px 12px;
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 4px;
 }

 #slider-container label {
 font-size: 10px;
 color: var(--text-dim);
 letter-spacing: 0.3px;
 }

 #opacity-slider {
 width: 110px;
 accent-color: var(--accent);
 cursor: pointer;
 }

 /* ===== LEAFLET OVERRIDES ===== */
 .leaflet-control-attribution { font-size: 8px !important; }

 /* ===== GPS BLUE DOT MARKER ===== */
 .blue-dot {
 width: 16px;
 height: 16px;
 background: #007AFF;
 border: 3px solid white;
 border-radius: 50%;
 box-shadow: 0 0 8px rgba(0, 122, 255, 0.8);
 }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div id="header">
 <span class="title">🎣 FishMap</span>
 <div id="gps-status">
 <span class="gps-dot searching" id="gps-dot"></span>
 <span id="gps-label">Searching…</span>
 </div>
</div>

<!-- ===== MAP ===== -->
<div id="map"></div>

<!-- ===== OPACITY SLIDER ===== -->
<div id="slider-container">
 <label for="opacity-slider">Contour opacity</label>
 <input type="range" id="opacity-slider" min="0" max="100" value="80">
</div>

<!-- ===== BOTTOM BAR ===== -->
<div id="bottom-bar">
 <button id="btn-me">📍 Me</button>
 <div id="coord-display">—<span class="sublabel">tap map</span></div>
 <button id="btn-log">🐟 Log Catch</button>
</div>

<!-- Leaflet v1.9.4 -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Turf.js for polygon clipping -->
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
(function () {
 'use strict';

 var LAKE_CENTER = [41.745230, -88.862420];
 var DEFAULT_ZOOM = 14;
 var STORAGE_KEY = 'fishmap_catches';

 var map = L.map('map', { center: LAKE_CENTER, zoom: DEFAULT_ZOOM, zoomControl: true });

 map.createPane('lakePane');
 map.getPane('lakePane').style.zIndex = 300;
 map.createPane('contourPane');
 map.getPane('contourPane').style.zIndex = 400;
 var depthLabelPane = map.createPane('labelPane');
 map.getPane('labelPane').style.zIndex = 500;

 /* Fix 1: HOT OSM tiles — warm beige land is hue-rotated green via CSS filter.
    #map background #8DB87A provides green fallback while tiles load. */
 L.tileLayer(
 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
 { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors | Tiles: HOT' }
 ).addTo(map);

 function getContourStyle() {
 return { color: '#5A5A5A', weight: 1, opacity: 1.0, fillOpacity: 0 };
 }

 var geoJsonLayer = null;
 var lakeTurfPolygon = null;

 fetch('data/shabbona-boundary.geojson')
 .then(function(res) { return res.json(); })
 .then(function(geojson) {
 var feature = geojson.features[0];
 if (!feature) { loadContours(); return; }
 var latlngs = feature.geometry.coordinates[0].map(function(c) { return [c[1], c[0]]; });
 L.polygon(latlngs, { color: 'none', fillColor: '#7FB5D5', fillOpacity: 1.0, interactive: false, pane: 'lakePane' }).addTo(map);
 lakeTurfPolygon = turf.polygon([feature.geometry.coordinates[0]]);
 loadContours();
 })
 .catch(function() { loadContours(); });

 /* Clip ALL contour features to lake boundary.
    - Polygon/MultiPolygon: use turf.intersect to clip filled areas to lake boundary.
    - LineString: use turf.lineSplit + midpoint-in-polygon to trim lines at boundary.
    This guarantees zero spill for BOTH fill areas and line strokes. */
 function clipFeatureToLake(feature) {
 if (!lakeTurfPolygon) return [feature];
 var geomType = feature.geometry.type;

 /* ---- Polygon / MultiPolygon clipping ---- */
 if (geomType === 'Polygon' || geomType === 'MultiPolygon') {
   try {
     var clipped = turf.intersect(feature, lakeTurfPolygon);
     if (!clipped) return []; /* no overlap with lake — skip entirely */
     clipped.properties = JSON.parse(JSON.stringify(feature.properties));
     return [clipped];
   } catch(e) {
     /* Fallback: check centroid — if inside lake, keep as-is */
     try {
       var centroid = turf.centroid(feature);
       if (turf.booleanPointInPolygon(centroid, lakeTurfPolygon)) return [feature];
       return [];
     } catch(e2) { return [feature]; }
   }
 }

 /* ---- LineString clipping ---- */
 try {
   var coords = feature.geometry.coordinates;
   if (!coords || coords.length < 2) return [];
   var line = turf.lineString(coords);
   var lakeBoundary = turf.polygonToLine(lakeTurfPolygon);
   var split = turf.lineSplit(line, lakeBoundary);
   if (!split || !split.features || split.features.length === 0) {
     /* lineSplit returned nothing — check if the whole line midpoint is inside */
     var midIdx = Math.floor(coords.length / 2);
     var midPt = turf.point(coords[midIdx]);
     if (turf.booleanPointInPolygon(midPt, lakeTurfPolygon)) return [feature];
     return [];
   }
   var kept = [];
   for (var i = 0; i < split.features.length; i++) {
     var seg = split.features[i];
     var segCoords = seg.geometry.coordinates;
     if (segCoords.length < 2) continue;
     var segMidIdx = Math.floor(segCoords.length / 2);
     var segMidPt = turf.point(segCoords[segMidIdx]);
     if (turf.booleanPointInPolygon(segMidPt, lakeTurfPolygon)) {
       kept.push({
         type: 'Feature',
         properties: JSON.parse(JSON.stringify(feature.properties)),
         geometry: seg.geometry
       });
     }
   }
   return kept;
 } catch(e) {
   /* Fallback: sample points, keep only if all are inside */
   try {
     var fc = feature.geometry.coordinates;
     var step = Math.max(1, Math.floor(fc.length / 10));
     for (var j = 0; j < fc.length; j += step) {
       if (!turf.booleanPointInPolygon(turf.point(fc[j]), lakeTurfPolygon)) return [];
     }
     if (!turf.booleanPointInPolygon(turf.point(fc[fc.length - 1]), lakeTurfPolygon)) return [];
     return [feature];
   } catch(e2) { return [feature]; }
 }
 }

 function loadContours() {
 fetch('data/shabbona-lake.geojson')
 .then(function(res) { return res.json(); })
 .then(function(data) {
   data.features = data.features.filter(function(f) { return f.properties.depth > 0; });
   if (lakeTurfPolygon) {
     var clippedFeatures = [];
     data.features.forEach(function(f) {
       var segments = clipFeatureToLake(f);
       for (var k = 0; k < segments.length; k++) {
         clippedFeatures.push(segments[k]);
       }
     });
     data.features = clippedFeatures;
   }
   renderContours(data);
 })
 .catch(function(err) { console.error('Failed to load GeoJSON:', err); });
 }

 var allContourFeatures = [];
 var contourFeatures = [];

 function renderContours(data) {
 allContourFeatures = data.features;
 geoJsonLayer = L.geoJSON(data, { pane: 'contourPane', style: getContourStyle, onEachFeature: function(feature, layer) { layer.bindPopup('Depth: ' + feature.properties.depth + ' ft'); } }).addTo(map);
 contourFeatures = data.features;
 updateContoursForZoom();
 }

 function updateContoursForZoom() {
 var zoom = map.getZoom();
 contourFeatures = zoom < 13 ? allContourFeatures.filter(function(f) { return f.properties.depth % 5 === 0; }) : allContourFeatures;
 if (geoJsonLayer) map.removeLayer(geoJsonLayer);
 geoJsonLayer = L.geoJSON({ type: 'FeatureCollection', features: contourFeatures }, { pane: 'contourPane', style: getContourStyle, onEachFeature: function(feature, layer) { layer.bindPopup('Depth: ' + feature.properties.depth + ' ft'); } }).addTo(map);
 geoJsonLayer.setStyle({ opacity: document.getElementById('opacity-slider').value / 100 });
 addLabels(contourFeatures);
 }

 var activeLabelMarkers = [];
 function clearLabels() { activeLabelMarkers.forEach(function(m) { map.removeLayer(m); }); activeLabelMarkers = []; }
 function placeLabel(latlng, depth) {
 var marker = L.marker(latlng, { icon: L.divIcon({ className: '', html: '<div style="color:#2B3D8F;font-size:12px;font-weight:400;font-family:sans-serif;white-space:nowrap;pointer-events:none;">' + depth + '</div>', iconSize: [20, 14], iconAnchor: [10, 7] }), pane: 'labelPane', interactive: false });
 marker.addTo(map);
 activeLabelMarkers.push(marker);
 }

 /* Helper: extract a flat coordinate array from any geometry type for label sampling */
 function getFeatureCoords(feature) {
 var geom = feature.geometry;
 if (geom.type === 'LineString') return geom.coordinates;
 if (geom.type === 'Polygon') return geom.coordinates[0]; /* outer ring */
 if (geom.type === 'MultiPolygon') return geom.coordinates[0][0]; /* first ring of first poly */
 if (geom.type === 'MultiLineString') return geom.coordinates[0]; /* first line */
 return geom.coordinates || [];
 }

 /* Label placement — single pass, exactly ONE label per depth value.
    1. Group all candidate coords by depth (11 samples per feature).
    2. For each depth, place the first valid in-bounds, in-lake candidate.
    3. No second pass. No cell blocking. Guarantees one label per depth. */
 function addLabels(features) {
 clearLabels();
 var bounds = map.getBounds();
 var zoom = map.getZoom();
 var labelInterval = (zoom < 13) ? 5 : 1;

 /* Build candidate points grouped by depth */
 var depthGroups = {};
 for (var fi = 0; fi < features.length; fi++) {
   var feature = features[fi];
   var d = feature.properties.depth;
   if (d <= 0 || d % labelInterval !== 0) continue;
   if (!depthGroups[d]) depthGroups[d] = [];
   var coords = getFeatureCoords(feature);
   if (!coords || coords.length < 2) continue;
   /* Sample 11 points: 0%, 10%, 20%, …, 100% */
   for (var p = 0; p <= 10; p++) {
     var idx = Math.min(Math.floor(p * (coords.length - 1) / 10), coords.length - 1);
     depthGroups[d].push(coords[idx]);
   }
 }

 /* For each depth, place exactly ONE label at the first valid candidate */
 var placedDepths = {};
 var depthKeys = Object.keys(depthGroups);
 for (var di = 0; di < depthKeys.length; di++) {
   var depth = depthKeys[di];
   if (placedDepths[depth]) continue;
   var candidates = depthGroups[depth];
   for (var ci = 0; ci < candidates.length; ci++) {
     var pt = candidates[ci];
     var latlng = L.latLng(pt[1], pt[0]);
     if (!bounds.contains(latlng)) continue;
     if (lakeTurfPolygon && !turf.booleanPointInPolygon(turf.point(pt), lakeTurfPolygon)) continue;
     placeLabel(latlng, depth);
     placedDepths[depth] = true;
     break; /* STOP — one label per depth, period */
   }
 }
 }

 map.on('zoomend', function() { if (allContourFeatures.length) updateContoursForZoom(); });
 map.on('moveend', function() { if (contourFeatures.length) addLabels(contourFeatures); });
 document.getElementById('opacity-slider').addEventListener('input', function () { if (geoJsonLayer) geoJsonLayer.setStyle({ opacity: this.value / 100 }); });

 var blueDotIcon = L.divIcon({ className: '', html: '<div class="blue-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] });
 var userMarker = null, accuracyCircle = null, userLatLng = null;
 var gpsDotEl = document.getElementById('gps-dot');
 var gpsLabel = document.getElementById('gps-label');

 function onGPSUpdate(pos) {
 var lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
 userLatLng = L.latLng(lat, lng);
 gpsDotEl.className = 'gps-dot active';
 gpsLabel.textContent = 'GPS \u00b1' + Math.round(acc) + 'm';
 if (userMarker) { userMarker.setLatLng(userLatLng); } else { userMarker = L.marker(userLatLng, { icon: blueDotIcon, zIndexOffset: 1000 }).addTo(map); }
 if (accuracyCircle) { accuracyCircle.setLatLng(userLatLng); accuracyCircle.setRadius(acc); } else { accuracyCircle = L.circle(userLatLng, { radius: acc, color: '#007AFF', fillColor: '#007AFF', fillOpacity: 0.1, weight: 1, opacity: 0.3 }).addTo(map); }
 }
 function onGPSError() { gpsDotEl.className = 'gps-dot'; gpsLabel.textContent = 'GPS unavailable'; }
 if ('geolocation' in navigator) { navigator.geolocation.watchPosition(onGPSUpdate, onGPSError, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }); } else { gpsLabel.textContent = 'No GPS'; }

 document.getElementById('btn-me').addEventListener('click', function () { if (userLatLng) map.setView(userLatLng, Math.max(map.getZoom(), DEFAULT_ZOOM)); });
 var coordDisplay = document.getElementById('coord-display');
 map.on('click', function (e) { coordDisplay.innerHTML = e.latlng.lat.toFixed(6) + ', ' + e.latlng.lng.toFixed(6) + '<span class="sublabel">tap location</span>'; });

 function loadCatches() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
 function saveCatches(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
 function addCatchMarker(entry) {
 var ts = new Date(entry.timestamp);
 var timeStr = ts.toLocaleDateString() + ' ' + ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
 L.marker([entry.lat, entry.lng], { icon: L.divIcon({ className: '', html: '<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.7))">🐟</div>', iconSize: [24,24], iconAnchor: [12,12] }) })
 .bindPopup('<div style="font-size:13px;line-height:1.5;color:#222"><b>🐟 ' + timeStr + '</b><br>' + entry.lat.toFixed(6) + ', ' + entry.lng.toFixed(6) + '</div>').addTo(map);
 }

 var catches = loadCatches();
 catches.forEach(addCatchMarker);
 var btnLog = document.getElementById('btn-log');
 btnLog.addEventListener('click', function () {
 if (!userLatLng) { alert('Waiting for GPS fix'); return; }
 var entry = { lat: userLatLng.lat, lng: userLatLng.lng, timestamp: Date.now() };
 catches.push(entry); saveCatches(catches); addCatchMarker(entry);
 btnLog.textContent = '✅ Logged!'; btnLog.classList.add('logged');
 setTimeout(function () { btnLog.textContent = '🐟 Log Catch'; btnLog.classList.remove('logged'); }, 1500);
 });
})();
</script>
</body>
</html>
